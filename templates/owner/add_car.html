{% extends "base.html" %}

{% block title %}Add Car - Car Owner{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>Add New Car</h1>
        <p>List your car for rental (requires admin approval)</p>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('owner.add_car') }}" enctype="multipart/form-data" class="car-form">
            <div class="form-group">
                <label for="registration">Car Registration/Number *</label>
                <input type="text" id="registration" name="registration" class="form-control" required placeholder="e.g., DL01AB1234" pattern="[A-Z]{2}\d{2}[A-Z]{2}\d{4}" title="Format: State Code (2 letters) + 2 digits + 2 letters + 4 digits">
                <small>Format: DL01AB1234 (State Code + 2 Digits + 2 Letters + 4 Digits)</small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="brand">Brand *</label>
                    <input type="text" id="brand" name="brand" class="form-control" required placeholder="e.g., Toyota">
                </div>

                <div class="form-group">
                    <label for="model">Model *</label>
                    <input type="text" id="model" name="model" class="form-control" required placeholder="e.g., Camry">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="year">Year *</label>
                    <input type="number" id="year" name="year" class="form-control" required min="1900" max="2025"
                        placeholder="2023">
                </div>

                <div class="form-group">
                    <label for="price_per_day">Price per Day (₹) *</label>
                    <input type="number" id="price_per_day" name="price_per_day" class="form-control" required min="1"
                        step="0.01" placeholder="50.00">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="4"
                    placeholder="Describe your car's features, condition, etc."></textarea>
            </div>

            <div class="form-group">
                <label for="image">Car Image</label>
                <input type="file" id="image" name="image" class="form-control-file" accept="image/*">
                <small>Accepted formats: PNG, JPG, JPEG, GIF (Max 5MB)</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Car</button>
                <a href="{{ url_for('owner.my_cars') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
